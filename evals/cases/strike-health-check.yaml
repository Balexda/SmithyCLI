# Strike end-to-end eval scenario (YAML declarative form).
#
# Mirrors the EvalScenario shape described in the data model (§1) and the
# TypeScript interface in evals/lib/types.ts, including the optional
# `sub_agent_evidence` field (FR-016). Single-quoted strings are used
# for regex patterns so backslash escapes (e.g. \*, \d, \r, \n) round-trip
# byte-for-byte to the parser.
#
# Spec:       specs/2026-04-06-003-smithy-evals-framework/smithy-evals-framework.spec.md
# Data model: specs/2026-04-06-003-smithy-evals-framework/smithy-evals-framework.data-model.md
# Contracts:  specs/2026-04-06-003-smithy-evals-framework/smithy-evals-framework.contracts.md

name: strike-health-check
skill: /smithy.strike
prompt: add a health check endpoint
structural_expectations:
  required_headings:
    - '## Summary'
    - '## Approach'
    - '## Risks'
  required_patterns:
    # `**Phase N: <Label>**` — bold workflow-stage markers emitted by strike.
    - '\*\*Phase \d+: [^*]+\*\*'
  forbidden_patterns:
    # Generic refusals / non-skill responses (FR-012).
    - "I'd be happy to help"
    - "Sure, here's"
    # Leading YAML frontmatter (AS 5.2); `\r?\n` tolerates CRLF line endings.
    - '^---\r?\n'
# Sub-agent invocation evidence (FR-016; Acceptance Scenarios 6.2, 6.3, 6.4).
#
# Patterns are grounded in evals/spike/FINDINGS.md and verified against the
# checked-in spike capture (evals/spike/output-strike.txt), not speculative.
# AS 6.1 (smithy-scout evidence) is intentionally NOT listed here — the spike
# confirmed strike does not dispatch scout, so scout coverage is delivered by
# the standalone `scoutScenario` rather than by extending strike.
#
# `Simplification` is kept in the plan-lens alternation alongside the other
# two lenses even though the checked-in spike capture shows only the
# `[via Robustness]` attribution marker. Strike dispatches all three lenses
# (see src/templates/agent-skills/snippets/competing-lenses-implementation.md),
# and which one's attribution survives reconciliation varies per run —
# excluding `Simplification` would produce a false failure on any run where
# reconcile surfaces only that lens. The `\[via ...\]` anchor keeps the
# pattern specific to plan's actual attribution marker so incidental prose
# containing a lens word cannot satisfy the check.
sub_agent_evidence:
  # smithy-plan: strike runs plan under three competing lenses and the
  # reconciled plan body carries `[via <Lens>]` attribution markers. The
  # `\[via ...\]` anchor ensures sub-agent evidence only passes when plan
  # output actually surfaces through reconciliation — a bare lens word in
  # unrelated prose will not false-trigger the check.
  - agent: smithy-plan
    pattern: '\[via (Separation of Concerns|Robustness|Simplification)\]'
  # smithy-reconcile: per FR-016's guidance, target the dispatch phrasing in
  # assistant text rather than a generic output heading ("reconciled plan"
  # could appear without a real dispatch). This mirrors the clarify pattern
  # below and matches the spike capture line `Now dispatching the
  # **smithy-reconcile** agent to synthesize them.`
  - agent: smithy-reconcile
    pattern: 'dispatching.*smithy-reconcile'
  # smithy-clarify: per FR-016's guidance, target the dispatch phrasing in
  # assistant text rather than agent-name presence alone. The `.*` here is
  # safe because the dispatch message is a single-line assistant string
  # (`Now dispatching the **smithy-clarify** agent for ambiguity scanning.`);
  # no newline appears between "the" and the agent name in the spike capture.
  - agent: smithy-clarify
    pattern: 'dispatching the.*smithy-clarify'
