# Strike end-to-end eval scenario (YAML declarative form).
#
# Mirrors the EvalScenario shape described in the data model (§1) and the
# TypeScript interface in evals/lib/types.ts, including the optional
# `sub_agent_evidence` field (FR-016). Single-quoted strings are used
# for regex patterns so backslash escapes (e.g. \*, \d, \r, \n) round-trip
# byte-for-byte to the parser.
#
# Spec:       specs/2026-04-06-003-smithy-evals-framework/smithy-evals-framework.spec.md
# Data model: specs/2026-04-06-003-smithy-evals-framework/smithy-evals-framework.data-model.md
# Contracts:  specs/2026-04-06-003-smithy-evals-framework/smithy-evals-framework.contracts.md
#
# Expectations are grounded in the captured output at /tmp/eval-captures/
# (see evals/README.md "Maintenance — when patterns drift" for how to refresh).
# Strike's output structure is the consolidated post-2026-04 form:
#   ## Summary  →  ## Assumptions  →  ## Specification Debt  →  ## PR
# with no inline narration of sub-agent dispatches; verification of plan,
# reconcile, and clarify dispatches relies on the cleaned-up Agent
# tool_result text exposed via `extractSubAgentDispatches`.

name: strike-health-check
skill: /smithy.strike
prompt: add a health check endpoint
structural_expectations:
  required_headings:
    - '## Summary'
    - '## Assumptions'
    - '## Specification Debt'
    - '## PR'
  required_patterns:
    # Strike's Summary section always emits a `**Spec folder**: ...` bullet at
    # the top — a template-driven marker that every successful strike run
    # produces. This catches the case where strike emits `## Summary` alone
    # but the body has drifted to a different shape.
    - '\*\*Spec folder\*\*'
  forbidden_patterns:
    # Generic refusals / non-skill responses (FR-012).
    - "I'd be happy to help"
    - "Sure, here's"
    # Leading YAML frontmatter (AS 5.2); `\r?\n` tolerates CRLF line endings.
    - '^---\r?\n'
# Sub-agent invocation evidence (FR-016; Acceptance Scenarios 6.2, 6.3, 6.4).
#
# The 2026-04-09 spike captured strike emitting "dispatching the X agent"
# narration in assistant text; the current strike template no longer narrates
# its dispatches inline (verified by the captured stream at
# /tmp/eval-captures/strike-health-check.events.jsonl, which shows 6 Agent
# tool calls with subagent_type set but no matching narration in the canonical
# text). Patterns therefore target each sub-agent's template-driven output
# marker, matched against the cleaned-up dispatch resultText that
# extractSubAgentDispatches now returns (parse-stream.ts).
#
# AS 6.1 (smithy-scout evidence) is intentionally NOT listed here — the spike
# confirmed strike does not dispatch scout, so scout coverage is delivered by
# the standalone `scoutScenario` rather than by extending strike.
sub_agent_evidence:
  # smithy-plan: every plan-template invocation begins its output with
  # `## Plan\n\n**Directive**: ...`. This is template-stable across all three
  # competing lenses (Simplification / Separation of Concerns / Robustness)
  # and matches against the dispatch resultText.
  - agent: smithy-plan
    pattern: '## Plan\n\n\*\*Directive\*\*'
  # smithy-reconcile: reconcile's resultText is prose-driven (no fixed
  # template heading), so we match its dispatch description, which the LLM
  # populates from strike's instruction to "use the smithy-reconcile
  # sub-agent". `^[Rr]econcil` anchors the match to the description start
  # and tolerates "Reconcile competing plans", "reconcile", "Reconciliation
  # pass", etc. The `^` anchor keeps incidental prose elsewhere from false-
  # triggering — descriptions are short summary strings that begin with
  # the dispatch verb.
  - agent: smithy-reconcile
    pattern: '^[Rr]econcil'
  # smithy-clarify: clarify returns a structured `ClarifyResult` with no
  # fixed Markdown heading (the captured 2026-04-27 run wrote
  # `## Step 1: Scan Assessment` in resultText, but a later run only
  # emitted the structured fields — ClarifyResult formatting is not
  # template-locked). The dispatch description is the stable signal —
  # the LLM's summary phrase always opens with a clarify form
  # ("Clarify reconciled plan", "clarify the strike doc", etc.) when
  # routing to smithy-clarify. `^[Cc]larif` matches Clarify, clarify, and
  # Clarification while staying anchored at description start.
  - agent: smithy-clarify
    pattern: '^[Cc]larif'
