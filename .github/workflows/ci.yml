name: Smithy CLI CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build Templates & CLI
      run: npm run build

    - name: Typecheck
      run: npx tsc --noEmit

    - name: Smoke Test
      run: npm test
